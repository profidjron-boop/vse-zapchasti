[mypy]
python_version = 3.12
warn_unused_configs = True
exclude = (?x)(^alembic/|^tests/)
ignore_missing_imports = True

# Current API codebase heavily uses dynamic SQLAlchemy patterns that produce
# high noise in mypy without a full Mapped[] migration.
disable_error_code =
    assignment,
    arg-type,
    return-value,
    call-overload,
    operator,
    var-annotated,
    misc,
    valid-type,
    import-untyped
