services:
  postgres:
    image: postgres:15
    container_name: vsez_postgres
    environment:
      POSTGRES_DB: vsez
      POSTGRES_USER: vsez
      POSTGRES_PASSWORD: vsez_dev_password_change_me
    ports:
      - "5433:5432"
    volumes:
      - vsez_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vsez -d vsez"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  vsez_pgdata:
