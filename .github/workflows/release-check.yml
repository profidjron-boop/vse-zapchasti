name: release-check

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  release-check:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      BACKUP_DIR: backups/postgres
      JWT_SECRET_KEY: ci_release_check_secret_change_me
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read pinned runtime versions
        id: versions
        run: |
          echo "node=$(awk '/^nodejs / {print $2}' .tool-versions)" >> "$GITHUB_OUTPUT"
          echo "python=$(awk '/^python / {print $2}' .tool-versions)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.versions.outputs.node }}
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.versions.outputs.python }}

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Prepare API dependencies
        run: |
          mkdir -p apps/api/.venv/bin
          ln -sf "$(command -v uv)" apps/api/.venv/bin/uv
          cd apps/api
          ./.venv/bin/uv sync

      - name: Install Web dependencies
        run: pnpm --dir apps/web install --frozen-lockfile

      - name: Run release-check
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            bash scripts/release-check.sh --skip-write-smoke
          else
            bash scripts/release-check.sh
          fi

      - name: Upload backup artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-check-backups
          path: backups/postgres/
          if-no-files-found: ignore
          retention-days: 7
