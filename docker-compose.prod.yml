services:
  postgres:
    image: postgres:15
    container_name: vsez_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - vsez_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: vsez_redis_prod
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - vsez_redisdata:/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: vsez_api_prod
    restart: unless-stopped
    env_file:
      - ./apps/api/.env.prod
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      WEB_ORIGIN: ${WEB_ORIGIN}
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /uploads
    volumes:
      - vsez_uploads:/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "127.0.0.1:8000:8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        API_BASE_URL: ${API_BASE_URL}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    container_name: vsez_web_prod
    restart: unless-stopped
    env_file:
      - ./apps/web/.env.prod
    environment:
      API_BASE_URL: ${API_BASE_URL}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    volumes:
      - vsez_uploads:/app/public/uploads
    depends_on:
      - api
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  vsez_pgdata:
  vsez_redisdata:
  vsez_uploads:
